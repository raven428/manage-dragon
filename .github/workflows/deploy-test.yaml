# kics-scan disable=555ab8f9-2001-455e-a077-f2d0f41e2fb9
---
name: test deploy
on:
  push:
    branches:
      - master
  pull_request:
  schedule:
    - cron: "11 11 * * 1"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  deploy-test:
    name: deploy
    timeout-minutes: 11
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - "debian13"
          - "ubuntu24"
          - "ubuntu26"
        platform:
          - docker
          - podman
          - nspawn
        ansible_ver:
          - "11"
    steps:
      - uses: actions/checkout@v7 # zizmor: ignore[unpinned-uses]
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false
      - name: checkout go-lib
        uses: actions/checkout@v7 # zizmor: ignore[unpinned-uses]
        with:
          repository: megalomania428/go-lib-ci
          ref: updates-002
          path: go-lib/ci
          persist-credentials: false
      - name: setup go
        uses: actions/setup-go@v7 # zizmor: ignore[unpinned-uses]
        with:
          go-version-file: golang/go.mod
          cache-dependency-path: golang/go.sum
      - name: test ansible deploy
        env:
          DISTRO: ${{ matrix.distro }}
          PLATFORM: ${{ matrix.platform }}
          ANSIBLE_VER: ${{ matrix.ansible_ver }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go -C golang run ./cmd/deploy-test
  linters:
    name: linters
    timeout-minutes: 11
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7 # zizmor: ignore[unpinned-uses]
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false
      - name: lint the repo
        env:
          BRA: master
        run: |
          curl -fsL \
          https://raw.githubusercontent.com/raven428/container-images/refs/heads/${{
          env.BRA }}/sources/linters-ubuntu-22_04/check-dir.sh | bash
          curl -fsL \
          https://raw.githubusercontent.com/raven428/container-images/refs/heads/${{
          env.BRA }}/sources/ansible-ubuntu/check-dir.sh | bash
  MegaLinter:
    name: MegaLinter
    timeout-minutes: 11
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7 # zizmor: ignore[unpinned-uses]
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false
      - name: checkout go-lib
        uses: actions/checkout@v7 # zizmor: ignore[unpinned-uses]
        with:
          repository: megalomania428/go-lib-ci
          ref: updates-002
          path: go-lib/ci
          persist-credentials: false
      - name: MegaLinter
        uses: oxsecurity/megalinter@v9 # zizmor: ignore[unpinned-uses]
        env:
          VALIDATE_ALL_CODEBASE: true
  all-green:
    name: all green
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs:
      - deploy-test
      - linters
      - MegaLinter
    if: always()
    permissions:
      checks: read
    steps:
      - name: waiting for checks success
        uses: poseidon/wait-for-status-checks@v0.6.0 # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: all green
          timeout: 111s
